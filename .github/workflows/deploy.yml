# Deploy Vite build output to GitHub Pages branch `pages`
# GitHub Pages must be configured in Settings → Pages:
# Source = Deploy from a branch → Branch = `pages`
name: Deploy dist to pages branch

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: npm run build

      # SPA: for direct refresh /prediction etc GitHub will serve 404.html
      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Publish to pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: pages
          force_orphan: true
          keep_files: false
